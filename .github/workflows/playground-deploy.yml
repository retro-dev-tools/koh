name: Deploy Koh Playground

on:
  push:
    branches: [master]
    paths:
      - 'src/Koh.Emulator.App/**'
      - 'src/Koh.Emulator.App.Shared/**'
      - 'src/Koh.Emulator.Core/**'
      - 'src/Koh.Debugger/**'
      - '.github/workflows/playground-deploy.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish Blazor WASM (AOT)
        run: dotnet publish src/Koh.Emulator.App -c Release -p:RunAOTCompilation=true -o ./playground-publish

      - name: Fix base href for GitHub Pages subpath
        run: sed -i 's|<base href="/" />|<base href="/koh/" />|g' ./playground-publish/wwwroot/index.html

      - name: Ensure .nojekyll so the _framework folder is served
        run: touch ./playground-publish/wwwroot/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./playground-publish/wwwroot

      - id: deployment
        uses: actions/deploy-pages@v4
