name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64,  vsce_target: linux-x64,    archive: tar.gz }
          - { os: windows-latest, rid: win-x64,    vsce_target: win32-x64,    archive: zip }
          - { os: macos-latest,   rid: osx-arm64,  vsce_target: darwin-arm64, archive: tar.gz }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Publish Koh.Emulator.App (NativeAOT)
        run: dotnet publish src/Koh.Emulator.App -c Release -r ${{ matrix.rid }}

      - name: Package emulator archive
        shell: bash
        run: |
          pub="src/Koh.Emulator.App/bin/Release/net10.0/${{ matrix.rid }}/publish"
          case "${{ matrix.archive }}" in
            zip)
              out="koh-emu-${{ github.ref_name }}-${{ matrix.rid }}.zip"
              python -c "import shutil, sys; shutil.make_archive(sys.argv[1][:-4], 'zip', sys.argv[2])" "$out" "$pub"
              ;;
            tar.gz)
              out="koh-emu-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz"
              tar -czf "$out" -C "$pub" .
              ;;
          esac
          ls -lh "$out"

      - name: Publish koh-lsp (self-contained)
        run: dotnet publish src/Koh.Lsp -c Release -r ${{ matrix.rid }} --self-contained -o editors/vscode/server

      - name: Publish koh-asm (NativeAOT)
        run: dotnet publish src/Koh.Asm -c Release -r ${{ matrix.rid }} -o editors/vscode/server

      - name: Publish koh-link (NativeAOT)
        run: dotnet publish src/Koh.Link -c Release -r ${{ matrix.rid }} -o editors/vscode/server

      - name: Install node deps
        working-directory: editors/vscode
        run: npm ci

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npm run compile

      - name: Package VSIX
        working-directory: editors/vscode
        run: npx vsce package --target ${{ matrix.vsce_target }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.rid }}
          path: |
            koh-emu-*.zip
            koh-emu-*.tar.gz
            editors/vscode/*.vsix
          if-no-files-found: error

  release:
    needs: build-platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Detect prerelease
        id: pre
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          # v0.x.x and anything with a pre-release suffix (v1.0.0-rc.1) are prereleases.
          if [[ "$tag" =~ ^v0\. ]] || [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          flags=(--repo "${{ github.repository }}" --generate-notes --verify-tag --title "$tag")
          if [[ "${{ steps.pre.outputs.prerelease }}" == "true" ]]; then
            flags+=(--prerelease)
          fi
          # Artifacts from build-platform preserve their workspace-relative
          # paths, so the VSIXes land under artifacts/editors/vscode/. Glob
          # with `find` so we pass files, not the intermediate directory.
          find artifacts -type f -print
          mapfile -t assets < <(find artifacts -type f)
          gh release create "$tag" "${flags[@]}" "${assets[@]}"
